name: E2E Smoke (cross-browser)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-smoke-cross-browser:
    name: Public + security smoke (production build)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      SKIP_ENV_VALIDATION: "1"
      FI_E2E_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-anon
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-service-role-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production

      - name: E2E smoke (build + start + Playwright)
        run: node scripts/run-e2e-smoke-production.mjs --skip-build --port=3000
        env:
          NODE_ENV: production

  authenticated-smoke:
    name: Authenticated journeys (staging credentials)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ secrets.FI_E2E_DEMO_ADMIN_EMAIL != '' && secrets.FI_E2E_DEMO_ADMIN_PASSWORD != '' && secrets.FI_E2E_TENANT_ID != '' }}

    env:
      SKIP_ENV_VALIDATION: "1"
      FI_E2E_BASE_URL: ${{ vars.FI_E2E_STAGING_URL || 'http://127.0.0.1:3000' }}
      FI_E2E_TENANT_ID: ${{ secrets.FI_E2E_TENANT_ID }}
      FI_E2E_DEMO_ADMIN_EMAIL: ${{ secrets.FI_E2E_DEMO_ADMIN_EMAIL }}
      FI_E2E_DEMO_ADMIN_PASSWORD: ${{ secrets.FI_E2E_DEMO_ADMIN_PASSWORD }}
      FI_E2E_OTHER_TENANT_ID: ${{ secrets.FI_E2E_OTHER_TENANT_ID }}
      FI_E2E_BROWSERS: chromium
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Authenticated e2e against staging
        run: npx playwright test --grep @authenticated
