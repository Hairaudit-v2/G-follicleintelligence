name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NODE_ENV: production
      SKIP_ENV_VALIDATION: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-anon
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-service-role-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check (app code)
        run: npm run format:check:ci

      - name: Migration version check
        run: npm run check:migrations

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck e2e
        run: npm run typecheck:e2e

      - name: Unit tests
        run: npm run test:unit

      - name: Production env rules (fixture)
        run: npm run check:env:production-rules

      - name: Production build
        run: npm run build
