name: E2E Security

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unauthenticated-fail-closed:
    name: Unauthenticated access (production build)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NODE_ENV: production
      SKIP_ENV_VALIDATION: "1"
      FI_E2E_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-anon
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.ci-placeholder-service-role-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Production build
        run: npm run build

      - name: E2E security (build + start + Playwright)
        run: node scripts/run-e2e-security-production.mjs --skip-build --port=3000