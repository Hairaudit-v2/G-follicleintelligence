<svg xmlns="http://www.w3.org/2000/svg" width="720" height="250" viewBox="0 0 720 250" role="img" aria-label="Ludwig scale — top-down progression of female pattern hair loss with preserved frontal hairline">
  <title>Ludwig scale (top-down)</title>
  <defs>
    <clipPath id="lwHead"><ellipse cx="120" cy="108" rx="86" ry="70"/></clipPath>
    <style>
      .plate{fill:#eef2f7;stroke:#cbd5e1;stroke-width:1}
      .ttl{fill:#334155;font:600 15px system-ui,sans-serif}
      .sub{fill:#64748b;font:400 11px system-ui,sans-serif}
      .lbl{fill:#334155;font:600 12px system-ui,sans-serif;text-anchor:middle}
      .hair{fill:#5b4636}
      .skin{fill:#f0dcc6}
      .thin{fill:#cbb59c}
      .edge{fill:none;stroke:#6b5443;stroke-width:2}
      .part{stroke:#f0dcc6;stroke-width:2;stroke-linecap:round}
      .nose{fill:#f0dcc6;stroke:#6b5443;stroke-width:1.5}
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="719" height="249" rx="14" class="plate"/>
  <text x="24" y="28" class="ttl">Ludwig scale</text>
  <text x="120" y="28" class="sub">top-down view · central part widens; frontal hairline preserved</text>

  <!-- Ludwig I : mild central thinning -->
  <g transform="translate(0,44)">
    <ellipse cx="120" cy="108" rx="86" ry="70" class="hair"/>
    <g clip-path="url(#lwHead)">
      <ellipse class="thin" cx="120" cy="116" rx="13" ry="52"/>
      <line class="part" x1="120" y1="64" x2="120" y2="168"/>
    </g>
    <ellipse cx="120" cy="108" rx="86" ry="70" class="edge"/>
    <path d="M112 41 L128 41 L120 29 Z" class="nose"/>
    <text x="120" y="214" class="lbl">Ludwig I (mild)</text>
  </g>

  <!-- Ludwig II : moderate central thinning -->
  <g transform="translate(240,44)">
    <ellipse cx="120" cy="108" rx="86" ry="70" class="hair"/>
    <g clip-path="url(#lwHead)">
      <ellipse class="skin" cx="120" cy="116" rx="20" ry="54"/>
      <ellipse class="thin" cx="120" cy="116" rx="30" ry="56"/>
      <ellipse class="skin" cx="120" cy="116" rx="18" ry="50"/>
      <line class="part" x1="120" y1="62" x2="120" y2="170"/>
    </g>
    <ellipse cx="120" cy="108" rx="86" ry="70" class="edge"/>
    <path d="M112 41 L128 41 L120 29 Z" class="nose"/>
    <text x="120" y="214" class="lbl">Ludwig II (moderate)</text>
  </g>

  <!-- Ludwig III : severe diffuse central loss -->
  <g transform="translate(480,44)">
    <ellipse cx="120" cy="108" rx="86" ry="70" class="hair"/>
    <g clip-path="url(#lwHead)">
      <ellipse class="thin" cx="120" cy="114" rx="50" ry="60"/>
      <ellipse class="skin" cx="120" cy="114" rx="40" ry="54"/>
      <line class="part" x1="120" y1="60" x2="120" y2="172"/>
    </g>
    <ellipse cx="120" cy="108" rx="86" ry="70" class="edge"/>
    <path d="M112 41 L128 41 L120 29 Z" class="nose"/>
    <text x="120" y="214" class="lbl">Ludwig III (severe)</text>
  </g>

  <!-- legend -->
  <g transform="translate(24,236)">
    <rect x="0" y="-9" width="12" height="12" rx="2" class="hair"/>
    <text x="18" y="1" class="sub">Hair</text>
    <rect x="74" y="-9" width="12" height="12" rx="2" class="thin"/>
    <text x="92" y="1" class="sub">Thinning</text>
    <rect x="158" y="-9" width="12" height="12" rx="2" fill="#f0dcc6" stroke="#6b5443" stroke-width="1"/>
    <text x="176" y="1" class="sub">Scalp visible</text>
  </g>
</svg>
